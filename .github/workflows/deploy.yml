name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}

          script: |
            set -e

            cd docker-node-app

            git pull origin main

            # Build new image
            docker build -t my-node-app .

            # Run temp container for validation
            docker rm -f temp-app || true
            docker run -d -p 3001:3000 --name temp-app my-node-app

            sleep 5
            docker logs temp-app

            # If temp container is not running, fail
            docker ps | grep temp-app

            # Replace old container
            docker rm -f myapp || true
            docker run -d -p 3000:3000 --name myapp --restart always my-node-app

            # Cleanup
            docker rm -f temp-app || true

            sudo systemctl restart nginx